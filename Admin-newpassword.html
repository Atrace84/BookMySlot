!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #eef1f5;
}

/* Center container */
.container {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Card design */
.card {
    background: #fff;
    padding: 40px 30px;
    border-radius: 25px;
    width: 320px;
    text-align: center;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

/* Logo */
.logo {
    width: 80px;
    margin-bottom: 10px;
}

/* Title */
h2 {
    color: #0b3c6f;
    margin-bottom: 25px;
}

/* Inputs */
input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 12px;
    border: 1px solid #ccc;
    outline: none;
    font-size: 14px;
}

/* Button */
button {
    width: 100%;
    padding: 14px;
    margin-top: 15px;
    border: none;
    border-radius: 12px;
    background: #157bb8;
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #0f5f91;
}
    </style>
</head>
<body>

<div class="container">
    <div class="card">

        <!-- Logo -->
        <img src="logo-removebg-preview.png" alt="Logo" class="logo">

        <!-- Title -->
        <h2>Reset Password</h2>

        <!-- Form -->
        <form id="resetForm">

            <input type="password" placeholder="New Password" required>

            <input type="password" placeholder="Confirm Password" required>

            <button type="submit">Reset Password</button>

        </form>

    </div>
</div>

<script src="script.js"></script>
<script>
    document.getElementById("resetForm").addEventListener("submit", function(e) {
    e.preventDefault();

    const password = document.querySelectorAll("input")[0].value;
    const confirmPassword = document.querySelectorAll("input")[1].value;

    if (password !== confirmPassword) {
        alert("Passwords do not match!");
        return;
    }

    alert("Password successfully reset!");

    // Redirect to Welcome/Login page
    window.location.href = "admin-login.html";
});
</script>
</body>
</html>
