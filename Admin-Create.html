<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <style>
        body {
    background-color: #f4f7f9;
    padding: 40px;
    font-family: Arial, sans-serif;
}

.application-container {
    max-width: 900px; /* Makes the form "Big" */
    margin: 0 auto;
    background: white;
    padding: 50px;
    border-radius: 8px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.1);
}

.form-header { text-align: center; border-bottom: 2px solid #0056b3; margin-bottom: 30px; padding-bottom: 20px; }
.app-logo { width: 150px; margin-bottom: 10px; }

h3 { color: #0056b3; border-left: 5px solid #ffa500; padding-left: 10px; margin-bottom: 20px; }

/* Grid Layout for Fields */
.input-row {
    display: grid;
    grid-template-columns: 1fr 1fr; /* Two columns */
    gap: 20px;
    margin-bottom: 20px;
}

.form-group label {
    display: block; /* Puts label on TOP */
    font-weight: bold;
    margin-bottom: 8px;
    font-size: 14px;
    color: #333;
}

input {
    width: 100%;
    padding: 12px;
    border: 1px solid #ccc;
    border-radius: 4px;
    box-sizing: border-box; /* Important for width */
}

.submit-btn {
    background: #0056b3;
    color: white;
    padding: 15px 40px;
    border: none;
    border-radius: 4px;
    font-size: 18px;
    cursor: pointer;
    width: 100%;
}

.error-msg { color: #d9534f; font-size: 13px; margin-top: 5px; }

    

    </style>
</head>
<body>
    <div class="application-container">
    <div class="form-header">
        <img src="logo.jpeg" alt="Logo" class="app-logo">
        <h1>Create Account</h1>
        <p class="instruction-text">Please ensure all details match your National ID or Passport. All fields marked with an asterisk (*) are mandatory.</p>
    </div>

    <form id="registrationForm" class="grid-form">
        <!-- Section: Personal Information -->
        <div class="form-section">
            <h3>Personal Details</h3>
            <div class="input-row">
                <div class="form-group">
                    <label for="firstName">Full Names (as per ID) *</label>
                    <input type="text" id="firstName" required>
                </div>
                <div class="form-group">
                    <label for="surname">Surname *</label>
                    <input type="text" id="surname" required>
                </div>
            </div>

            <div class="input-row">
                <div class="form-group">
                    <label for="studentNum">Student Number</label>
                    <input type="text" id="studentNum" placeholder="e.g. 21405060">
                </div>
                <div class="form-group">
                    <label for="dob">Date of Birth *</label>
                    <input type="date" id="dob" required>
                </div>
            </div>
        </div>

        <!-- Section: Contact Information -->
        <div class="form-section">
            <h3>Contact Details</h3>
            <div class="input-row">
                <div class="form-group">
                    <label for="regEmail">Official Email Address *</label>
                    <input type="email" id="regEmail" required>
                </div>
                <div class="form-group">
                    <label for="phone">Mobile Phone Number *</label>
                    <input type="tel" id="phone" required>
                </div>
            </div>
        </div>

        <!-- Section: Security -->
        <div class="form-section">
            <h3>Security & Password</h3>
            <p class="field-note">Requirement: Min 15 chars, must include numbers/special characters, no repeating characters.</p>
            <div class="form-group full-width">
                <label for="regPassword">Create Portal Password *</label>
                <input type="password" id="regPassword" required>
            </div>
            <p id="passwordError" class="error-msg"></p>
        </div>

        <button type="submit" class="submit-btn">Register</button>
    </form>
</div>
<script>
    document.getElementById('registrationForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const password = document.getElementById('regPassword').value;
    const errorDisplay = document.getElementById('passwordError');

    // 1. Length Check (at least 15)
    if (password.length < 15) {
        showError("Password must be at least 15 characters.");
        return;
    }

    // 2. No repeating letters/patterns (Case-insensitive check for adjacent identical chars)
    if (/(.)\1/i.test(password)) {
        showError("Password cannot have repeating characters (e.g., 'aa' or '11').");
        return;
    }

    // 3. Numbers and Special Characters check
    const hasNumber = /\d/.test(password);
    const hasSpecial = /[!@#$%^&*(),.?":{}|<>]/.test(password);
    if (!hasNumber || !hasSpecial) {
        showError("Password must include numbers and special characters.");
        return;
    }

    // If valid, trigger email (See Section 4)
    sendConfirmationEmail();
});

function showError(msg) {
    const errorDisplay = document.getElementById('passwordError');
    errorDisplay.textContent = msg;
    errorDisplay.style.display = 'block';
}
function sendConfirmationEmail() {
    emailjs.init("YOUR_PUBLIC_KEY");
    const templateParams = {
        user_email: document.getElementById('regEmail').value,
        user_password: document.getElementById('regPassword').value,
        user_name: document.getElementById('firstName').value
    };

    emailjs.send('YOUR_SERVICE_ID', 'YOUR_TEMPLATE_ID', templateParams)
        .then(() => {
            alert("Account Created! Confirmation email sent.");
            window.location.href = "login.html";
        }, (error) => {
            alert("Failed to send email: " + JSON.stringify(error));
        });
}


</script>

</body>
</html>
