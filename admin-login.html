<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SignIn</title>
    <style>
        /* General Background */
body {
    background-color: #f0f4f8;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
}

/* The White Card */
.login-card {
    background: white;
    padding: 40px;
    border-radius: 30px;
    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
    width: 320px;
    text-align: center;
}

h2 {
    color: #002b5c;
    margin-bottom: 30px;
}

/* Input Styling */
.input-group {
    background: #fff;
    border: 1px solid #e1e8ef;
    border-radius: 15px;
    margin-bottom: 15px;
    display: flex;
    align-items: center;
    padding: 12px 15px;
}

.input-group input {
    border: none;
    outline: none;
    width: 100%;
    font-size: 14px;
    color: #333;
}

.icon { margin-right: 10px; opacity: 0.6; }

/* The Blue Login Button */
.login-btn {
    background-color: #0081c9;
    color: white;
    border: none;
    width: 100%;
    padding: 14px;
    border-radius: 15px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(0, 129, 201, 0.3);
    margin: 20px 0;
}

/* Links at the bottom */
.footer-links a {
    text-decoration: none;
    color: #0081c9;
    font-size: 14px;
    display: block;
    margin: 10px 0;
}

hr {
    border: 0;
    border-top: 1px solid #eee;
    width: 50%;
    margin: 15px auto;
}
/* Target the logo specifically */
.logo img {
    width: 150px;      
    height: auto;        
    display: block;      
    margin: 0 auto;      
    margin-bottom: 20px; 
}


    </style>
</head>
<body>
    <div class="login-container">
    <div class="login-card">
        <div class="logo">
            <div class="logo-cloud">
                <img src="logo-removebg-preview.png" alt="chat logo">
            </div>
        </div>

        <h2>Welcome Admin</h2>

        <form>
            <div class="input-group">
                
                <input type="email" placeholder="Email">
            </div>

            <div class="input-group">
               
                <input type="password" placeholder="Password">
              
            </div>

            <button type="submit" class="login-btn">Login</button>
        </form>

        <div class="footer-links">
            <a href="Admin-Forgot.html" class="forgot-pass">Forgot Password?</a>
            <hr>
            <a href="Admin-Create.html" class="create-acc">Create Account</a>
        </div>
    </div>
</div>
<script>
   
    const loginForm = document.getElementById('loginForm');

    loginForm.addEventListener('submit', function(event) {
        event.preventDefault(); // Stops the page from refreshing

        // Get the values the user typed
        const email = document.getElementById('userEmail').value;
        const password = document.getElementById('userPassword').value;

        // Simple validation check (You can change "admin@test.com" and "1234" to anything)
        if (email === "admin@test.com" && password === "1234") {
            alert("Login Successful!");
            window.location.href = "Home.html"; // Takes you to the home page
        } else {
            alert("Invalid email or password. Please try again.");
        }
    });


</script>

</body>
</html>
