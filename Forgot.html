<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Reset Password</title>
  <style>
    body { font-family: Arial, sans-serif; 
      background: #f2f5f9;
       display: flex;
        justify-content: center; 
        align-items: center; height: 100vh; }
    .container { 
      background: #fff;
      padding: 30px;
      border-radius: 20px; 
      width: 320px; 
      text-align: center; 
      box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
    .logo { 
      width: 70px; 
      margin-bottom: 10px; }
    h2 { 
      margin-bottom: 20px; }
    .input-box input { 
      width: 100%; 
      padding: 12px; 
      border-radius: 10px; 
      border: 1px solid #ccc; 
      margin-bottom: 15px; 
      box-sizing: border-box; }
    button { width: 100%; 
      padding: 12px; 
      border: none; 
      border-radius: 10px; 
      background: linear-gradient(to right, #0077b6, #00b4d8); 
      color: white; font-size: 16px; 
      cursor: pointer; }
    button:hover { opacity: 0.9; }
    #message { margin-top: 15px; 
      font-size: 14px; color: #0077b6; 
      font-weight: bold; }
    .hidden { 
      display: none; }
  </style>
</head>
<body>

<div class="container">
  <img src="logo-removebg-preview.png" alt="Logo" class="logo">
  <h2>Reset Your Password</h2>
  <p style="font-size: 13px; color: #666; margin-bottom: 20px;">Enter your email and we will send you a link to reset your password.</p>

  <div class="input-box">
    <input type="email" id="email" placeholder="Enter Registered Email">
  </div>

  <button id="resetBtn">Send Reset Link</button>

  <p id="message"></p>
  
  <div style="margin-top: 20px;">
      <a href="Welcome.html" style="text-decoration: none; color: #0077b6; font-size: 14px;">Back to Login</a>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
  import { getAuth, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";

  // Your Firebase configuration
  const firebaseConfig = {
    apiKey: "AIzaSyCgxczNpy7nLk4bfTjBKMkcXNfgoEMKvZ8",
    authDomain: "bookmyslot-b3f29.firebaseapp.com",
    projectId: "bookmyslot-b3f29",
    storageBucket: "bookmyslot-b3f29.firebasestorage.app",
    messagingSenderId: "494612742628",
    appId: "1:494612742628:web:5bd1bbc642b7449b29c7f1"
  };

  // Initialize Firebase
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  const resetBtn = document.getElementById('resetBtn');
  const messageBox = document.getElementById('message');

  resetBtn.addEventListener('click', async () => {
    const email = document.getElementById("email").value;

    if (!email) {
      alert("Please enter your email address.");
      return;
    }

    messageBox.innerHTML = "Processing...";

    try {
      // Firebase function to send reset email
      await sendPasswordResetEmail(auth, email);
      
      messageBox.style.color = "green";
      messageBox.innerHTML = "Success! Check your email (and spam folder) for the reset link.";
      
      // Clear input
      document.getElementById("email").value = "";

    } catch (error) {
      console.error("Error code:", error.code);
      messageBox.style.color = "red";
      
      if (error.code === 'auth/user-not-found') {
        messageBox.innerHTML = "No account found with this email.";
      } else {
        messageBox.innerHTML = "Error: " + error.message;
      }
    }
  });
</script>

</body>
</html>
