<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Registration</title>
    <style>
        body { background-color: #f4f7f9; 
            padding: 40px; font-family: Arial, sans-serif; }
        .application-container { 
            max-width: 900px; margin: 0 auto; 
            background: white; padding: 50px; 
            border-radius: 8px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .form-header { 
            text-align: center; 
            border-bottom: 2px solid #0056b3; 
            margin-bottom: 30px; 
            padding-bottom: 20px; }
        .app-logo { 
            width: 150px; margin-bottom: 10px; }
        h3 { 
            color: #0056b3; 
            border-left: 5px solid #ffa500; 
            padding-left: 10px; 
            margin-bottom: 20px; }
        .input-row { 
            display: grid; grid-template-columns: 1fr 1fr; gap: 20px; 
            margin-bottom: 20px; }
        .form-group label { 
            display: block; font-weight: bold; 
            margin-bottom: 8px; font-size: 14px; color: #333; }
        input { 
            width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 4px; 
            box-sizing: border-box; 
        }
        .submit-btn { 
            background: #0056b3; color: white; padding: 15px 40px; border: none; border-radius: 4px; font-size: 18px; cursor: pointer; width: 100%; }
        #message-box { 
            text-align: center; margin-top: 20px; 
            font-weight: bold; 
        }
    </style>
</head>
<body>
    <div class="application-container">
        <div class="form-header">
            <img src="logo.jpeg" alt="Logo" class="app-logo">
            <h1>Admin Registration</h1>
            <p>Enter official credentials to create an administrator account.</p>
        </div>

        <form id="AdminRegistrationForm">
            <div class="form-section">
                <h3>Personal Details</h3>
                <div class="input-row">
                    <div class="form-group">
                        <label for="firstName">Full Names *</label>
                        <input type="text" id="firstName" placeholder="First Names" required>
                    </div>
                    <div class="form-group">
                        <label for="surname">Surname *</label>
                        <input type="text" id="surname" placeholder="Surname" required>
                    </div>
                </div>

                <div class="input-row">
                    <div class="form-group">
                        <label for="staffID">Staff ID *</label>
                        <!-- UPDATED PLACEHOLDER -->
                        <input type="text" id="staffID" placeholder="Enter Staff ID (e.g. ADM-101)" required>
                    </div>
                    <div class="form-group">
                        <label for="dob">Date of Birth *</label>
                        <input type="date" id="dob" required>
                    </div>
                </div>
            </div>

            <div class="form-section">
                <h3>Contact Details</h3>
                <div class="input-row">
                    <div class="form-group">
                        <label for="regEmail">Work Email *</label>
                        <!-- UPDATED PLACEHOLDER -->
                        <input type="email" id="regEmail" placeholder="Enter Work Email Address" required>
                    </div>
                    <div class="form-group">
                        <label for="phone">Phone Number *</label>
                        <input type="tel" id="phone" placeholder="Contact Number" required>
                    </div>
                </div>
            </div>

            <div class="form-section">
                <h3>Security</h3>
                <div class="form-group">
                    <label for="regPassword">Create Admin Password *</label>
                    <input type="password" id="regPassword" placeholder="Minimum 6 characters" required minlength="6">
                </div>
            </div>

            <button type="submit" class="submit-btn">Register Admin</button>
        </form>
        <div id="message-box"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCgxczNpy7nLk4bfTjBKMkcXNfgoEMKvZ8",
            authDomain: "bookmyslot-b3f29.firebaseapp.com",
            projectId: "bookmyslot-b3f29",
            storageBucket: "bookmyslot-b3f29.firebasestorage.app",
            messagingSenderId: "494612742628",
            appId: "1:494612742628:web:5bd1bbc642b7449b29c7f1"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const form = document.getElementById('AdminRegistrationForm');
        const messageBox = document.getElementById('message-box');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            messageBox.innerHTML = "Creating Admin Account...";

            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            const staffId = document.getElementById('staffID').value;
            const firstName = document.getElementById('firstName').value;
            const surname = document.getElementById('surname').value;
            const dob = document.getElementById('dob').value;
            const phone = document.getElementById('phone').value;

            try {
                // 1. Create account in Firebase Auth
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                // 2. Save data to 'admins' collection
                await setDoc(doc(db, "admins", user.uid), {
                    firstName: firstName,
                    surname: surname,
                    staffId: staffId, // This is what the login page checks
                    dob: dob,
                    email: email,
                    phone: phone,
                    role: "admin",
                    createdAt: new Date().toISOString()
                });

                messageBox.style.color = "green";
                messageBox.innerHTML = "Admin Registration Successful!";
                alert("Success! Admin account created.");
                window.location.href = "admin_login.html";

            } catch (error) {
                messageBox.style.color = "red";
                messageBox.innerHTML = "Error: " + error.message;
            }
        });
    </script>
</body>
</html>
